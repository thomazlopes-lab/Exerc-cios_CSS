<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>FlexBox</title>
        <style>
            .conteudo{
                height: 100px;
                display: flex;
                gap: 5px;
                background-color: aqua;
                /*
                
               /* comportamento do intem - linha ou coluna
                row, row-reverse, column, column-reverse*/
                flex-direction: row;
                
               /* quebra do layout
                nowwrap, wrap, wrap-reverse*/ 
                flex-wrap: nowrap;

               /* distribuição dos itens na horizontal
                flex-star, flex-end, center, space-between, space-around*/
                justify-content: space-around;

               /*distribuição dos itens na vertical
                 stretch, center, flex-star, flex-end, baseline  */
                align-items: center;
                          
              
            }

         .item{
                width: 260px;
                height: 50px;
                background: rgb(237, 167, 167);
             
              
                /*
                flex-grow: 0;
                flex-shrink: 1;
                flex-basis: 30px;*/
            } 

                /*
                .itemA{
                    flex-grow: 1;
                    flex-shrink: 2;
                }
*/
        



            /*
          .order1{
                order: 1;
            }
            .order2{
                order: 2;
            }
            .order3{
                order: 3;
            }
            .order4{
                order: 4;
            }
            */
        </style>
    </head>
    <body>
        <h1>Flex Box</h1>
        <div class="conteudo">
            <div class="item">01</div>
            <div class="item">02</div>
            <div class="item">03</div>
            <div class="item">04</div>
        </div>
    </body>
</html>
